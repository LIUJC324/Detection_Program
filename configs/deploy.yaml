service:
  host: 0.0.0.0
  port: 8000
  model_path: ./weights/best.pt
  class_mapping_path: ./class_mapping.json
  device: cuda
  score_thresh: 0.35
  nms_thresh: 0.35
  detections_per_img: 50
  request_timeout_seconds: 30
  ffmpeg_path: /home/liujuncheng/miniconda3/bin/ffmpeg
  ffprobe_path: /home/liujuncheng/miniconda3/bin/ffprobe
  ffprobe_timeout_seconds: 20
  ffmpeg_low_latency: true
  ffmpeg_rw_timeout_us: 15000000
  ffmpeg_startup_analyzeduration: 1000000
  ffmpeg_startup_probesize: 1048576
  stream_start_retry_count: 3
  stream_start_retry_delay_seconds: 2.0
  result_min_confidence: 0.65
  callback_min_confidence: 0.65
  callback_fallback_min_confidence: 0.45
  callback_drop_degenerate_size: 2
  default_stream_sample_fps: 2.0
  default_pair_layout: side_by_side_h
  default_rgb_position: left
  callback_timeout_seconds: 5
  annotation_mode: rectangle
  point_min_confidence: 0.4
  point_merge_distance: 18
  log_dir: ./outputs/service_logs
  log_level: INFO
  log_max_bytes: 10485760
  log_backup_count: 5
  session_progress_log_interval: 20
