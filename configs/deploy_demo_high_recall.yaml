service:
  host: 127.0.0.1
  port: 18000
  model_path: ./weights/best.pt
  class_mapping_path: ./class_mapping.json
  device: cuda
  score_thresh: 0.2
  nms_thresh: 0.4
  detections_per_img: 100
  request_timeout_seconds: 30
  ffmpeg_path: /home/liujuncheng/miniconda3/bin/ffmpeg
  ffprobe_path: /home/liujuncheng/miniconda3/bin/ffprobe
  ffprobe_timeout_seconds: 30
  ffmpeg_low_latency: false
  ffmpeg_rw_timeout_us: 30000000
  ffmpeg_startup_analyzeduration: 5000000
